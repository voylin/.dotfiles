# Styling
shadow = false
fading = false

## Styling - Transparency/Opacity
inactive-opacity = 1
frame-opacity = 1.0
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];

## Styling - Corners
corner-radius = 0
rounded-corners-exclude = [
	"window_type = 'dock'",
	"window_type = 'desktop'"
];

## Styling - Background-Blurring
blur-kern = ""
blur-background-exclude = [
	"window_type = 'dock'",
	"window_type = 'desktop'",
	"_GTK_FRAME_EXTENTS@:c"
];

# General Settings
backend = "xrender";
vsync = false
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = false
glx-no-stencil = true;
use-damage = true;
log-level = "warn";
